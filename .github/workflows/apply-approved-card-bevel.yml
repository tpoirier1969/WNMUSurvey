name: Apply approved stage-card bevel

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-approved-card-bevel.yml"

permissions:
  contents: write

jobs:
  apply-card-bevel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update canonical stage-card surface
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("css/stage-interface.css")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              text = text.replace(old, new, 1)

          replace_once(
          '''  background:
              radial-gradient(circle at 28% 10%, rgba(255, 255, 255, 0.98) 0 12%, transparent 26%),
              linear-gradient(145deg, #fff, var(--soft) 70%, #fff);''',
          '''  background: var(--soft);''',
          "base card background"
          )

          replace_once(
          '''  box-shadow:
              0 9px 0 var(--shadow),
              0 15px 23px rgba(27, 43, 63, 0.18),
              inset 0 0 0 7px rgba(255, 255, 255, 0.78),
              inset 0 -7px 15px rgba(32, 57, 92, 0.08);''',
          '''  box-shadow:
              0 13px 24px rgba(27, 43, 63, 0.18),
              0 4px 8px rgba(27, 43, 63, 0.10),
              inset 12px 12px 24px rgba(255, 255, 255, 0.52),
              inset -12px -14px 26px color-mix(in srgb, var(--dark) 15%, transparent),
              inset 0 0 0 2px rgba(255, 255, 255, 0.34);''',
          "base card bevel"
          )

          replace_once(
          '''  inset: 8px 8px auto;
            height: 34%;
            border-radius: calc(var(--card-radius) - 7px) calc(var(--card-radius) - 7px) 58% 58%;
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.16));
            pointer-events: none;''',
          '''  inset: 0;
            height: auto;
            border-radius: inherit;
            background:
              linear-gradient(
                145deg,
                rgba(255, 255, 255, 0.18) 0%,
                rgba(255, 255, 255, 0.07) 38%,
                rgba(255, 255, 255, 0) 60%,
                rgba(0, 0, 0, 0.025) 100%
              );
            box-shadow: inset 0 0 22px rgba(255, 255, 255, 0.12);
            pointer-events: none;''',
          "full-face blended highlight"
          )

          replace_once(
          '''  box-shadow:
              0 9px 0 var(--shadow),
              0 17px 25px rgba(27, 43, 63, 0.2),
              inset 0 0 0 7px rgba(255, 255, 255, 0.82);''',
          '''  box-shadow:
              0 15px 27px rgba(27, 43, 63, 0.20),
              0 5px 9px rgba(27, 43, 63, 0.10),
              inset 12px 12px 24px rgba(255, 255, 255, 0.56),
              inset -12px -14px 26px color-mix(in srgb, var(--dark) 15%, transparent),
              inset 0 0 0 2px rgba(255, 255, 255, 0.38);''',
          "hover bevel"
          )

          replace_once(
          '''  box-shadow:
              0 2px 0 var(--shadow),
              0 4px 8px rgba(27, 43, 63, 0.14),
              inset 0 5px 12px rgba(18, 38, 69, 0.18),
              inset 0 0 0 7px rgba(255, 255, 255, 0.65);''',
          '''  box-shadow:
              0 4px 8px rgba(27, 43, 63, 0.13),
              inset 7px 7px 15px rgba(255, 255, 255, 0.30),
              inset -7px -8px 16px color-mix(in srgb, var(--dark) 20%, transparent),
              inset 0 4px 12px rgba(18, 38, 69, 0.16),
              inset 0 0 0 2px rgba(255, 255, 255, 0.26);''',
          "pressed bevel"
          )

          replace_once(
          '''  box-shadow:
              0 4px 0 var(--shadow),
              0 7px 11px rgba(27, 43, 63, 0.14),
              inset 0 4px 11px rgba(18, 38, 69, 0.16),
              inset 0 0 0 7px rgba(255, 255, 255, 0.68);''',
          '''  box-shadow:
              0 6px 11px rgba(27, 43, 63, 0.14),
              inset 8px 8px 16px rgba(255, 255, 255, 0.34),
              inset -8px -9px 17px color-mix(in srgb, var(--dark) 18%, transparent),
              inset 0 4px 11px rgba(18, 38, 69, 0.14),
              inset 0 0 0 2px rgba(255, 255, 255, 0.28);''',
          "current-stage bevel"
          )

          replace_once(
          '''    box-shadow:
                0 5px 0 var(--shadow),
                0 8px 12px rgba(27, 43, 63, 0.16),
                inset 0 0 0 4px rgba(255, 255, 255, 0.76);''',
          '''    box-shadow:
                0 7px 13px rgba(27, 43, 63, 0.16),
                0 2px 5px rgba(27, 43, 63, 0.08),
                inset 6px 6px 12px rgba(255, 255, 255, 0.48),
                inset -6px -7px 13px color-mix(in srgb, var(--dark) 14%, transparent),
                inset 0 0 0 1px rgba(255, 255, 255, 0.32);''',
          "compact card bevel"
          )

          replace_once(
          '''    inset: 5px 6px auto;
              height: 43%;
              border-radius: 27px 27px 55% 55%;''',
          '''    inset: 0;
              height: auto;
              border-radius: inherit;''',
          "compact full-face highlight"
          )

          replace_once(
          '''    box-shadow:
                0 5px 0 var(--shadow),
                0 10px 14px rgba(27, 43, 63, 0.18),
                inset 0 0 0 4px rgba(255, 255, 255, 0.8);''',
          '''    box-shadow:
                0 9px 15px rgba(27, 43, 63, 0.18),
                0 3px 6px rgba(27, 43, 63, 0.08),
                inset 6px 6px 12px rgba(255, 255, 255, 0.52),
                inset -6px -7px 13px color-mix(in srgb, var(--dark) 14%, transparent),
                inset 0 0 0 1px rgba(255, 255, 255, 0.36);''',
          "compact hover bevel"
          )

          replace_once(
          '''    box-shadow:
                0 2px 0 var(--shadow),
                0 4px 7px rgba(27, 43, 63, 0.13),
                inset 0 4px 9px rgba(18, 38, 69, 0.16),
                inset 0 0 0 4px rgba(255, 255, 255, 0.68);''',
          '''    box-shadow:
                0 4px 7px rgba(27, 43, 63, 0.13),
                inset 4px 4px 9px rgba(255, 255, 255, 0.30),
                inset -4px -5px 10px color-mix(in srgb, var(--dark) 18%, transparent),
                inset 0 4px 9px rgba(18, 38, 69, 0.14),
                inset 0 0 0 1px rgba(255, 255, 255, 0.28);''',
          "compact current bevel"
          )

          replace_once(
          '''    box-shadow:
                0 6px 0 var(--shadow),
                0 10px 15px rgba(27, 43, 63, 0.17),
                inset 0 0 0 4px rgba(255, 255, 255, 0.76);''',
          '''    box-shadow:
                0 8px 15px rgba(27, 43, 63, 0.17),
                0 3px 6px rgba(27, 43, 63, 0.08),
                inset 6px 6px 12px rgba(255, 255, 255, 0.48),
                inset -6px -7px 13px color-mix(in srgb, var(--dark) 14%, transparent),
                inset 0 0 0 1px rgba(255, 255, 255, 0.32);''',
          "mobile card bevel"
          )

          if text.count("{") != text.count("}"):
              raise SystemExit("CSS brace count is unbalanced after replacement")
          if "0 9px 0 var(--shadow)" in text or "0 5px 0 var(--shadow)" in text or "0 6px 0 var(--shadow)" in text:
              raise SystemExit("A colored lower-edge band remains in the stage-card CSS")

          path.write_text(text, encoding="utf-8")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-approved-card-bevel.yml
          git add css/stage-interface.css
          git commit -m "Apply approved soft inner-bevel stage cards"
          git push origin HEAD:main
